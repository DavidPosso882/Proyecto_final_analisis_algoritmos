# ============================================
# CONFIGURACION BASE DE DATOS - MARIADB
# ============================================

spring.datasource.url=jdbc:mariadb://localhost:3306/analisis_algoritmos
spring.datasource.username=root
spring.datasource.password=@Pass1234
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# API KEYS - Configurar segun fuente de datos
# ============================================
api.alphavantage.key=TU_API_KEY_AQUI

# ============================================
# CONFIGURACION ETL
# ============================================
etl.request.delay=15000
etl.max.retries=3
etl.http.timeout=30000

# ============================================
# SERVER
# ============================================
server.port=8080

# ============================================
# LOGGING
# ============================================
logging.level.com.analisis.algoritmos=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# ============================================
# JACKSON - JSON
# ============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# ============================================
# NOTAS DE CONFIGURACION
# ============================================
# 1. MariaDB debe estar corriendo en localhost:3306
# 2. Base de datos 'analisis_algoritmos' debe existir o tener permisos de creacion
# 3. Para usar H2 en lugar de MariaDB, cambiar las propiedades de conexion
